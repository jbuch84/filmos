apply plugin: 'com.android.application'

android {
    compileSdkVersion 25
    buildToolsVersion "26.0.2"

    defaultConfig {
        applicationId "com.sony.jpgcookbook"
        minSdkVersion 9
        targetSdkVersion 25
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            // This is the key: we tell it the camera brain is in the 'stubs' folder
            java.srcDirs = ['src/main/java', 'src/main/stubs']
        }
    }
}