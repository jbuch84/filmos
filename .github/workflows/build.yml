name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Setup Android SDK & Vintage NDK
      run: |
        # Force pointing to the NDK version pre-installed on the runner
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/21.4.7075529" > local.properties
        echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
        # Clear out modern tools that cause the 34x/35x errors
        rm -rf $ANDROID_SDK_ROOT/platforms/android-3*
        rm -rf $ANDROID_SDK_ROOT/build-tools/3*

    - name: Manually Generate Wrapper
      run: |
        # This downloads the correct old Gradle directly instead of using the system one
        wget https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
        unzip -q gradle-4.10.3-bin.zip
        export PATH=$PWD/gradle-4.10.3/bin:$PATH
        gradle wrapper --gradle-version 4.10.3
        chmod +x gradlew

    - name: Build APK with Native Engine
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Sony-JPGCookbook-NDK
        path: app/build/outputs/apk/debug/*.apk